name: Update World Cup player goals

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/update_worldcup_goals.mjs
      - name: Commit updated data
        run: |
          if git diff --quiet -- data/worldcup_player_goals_breakdown.json; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/worldcup_player_goals_breakdown.json
          git commit -m "Update World Cup player goals data"
          git push
